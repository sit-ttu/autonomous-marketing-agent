packages:
  - .
  - ui
  - packages/*
  - extensions/*

# Baileys (extensions/whatsapp) resolves libsignal from a GitHub tarball subdep.
# pnpm 10.26+ defaults blockExoticSubdeps=true, which blocks that install path.
blockExoticSubdeps: false

minimumReleaseAge: 2880

overrides:
  hono: 4.12.14
  "@hono/node-server": 1.19.14
  fast-xml-parser: 5.5.7
  request: npm:@cypress/request@3.0.10
  request-promise: npm:@cypress/request-promise@5.0.0
  file-type: 22.0.0
  form-data: 2.5.4
  minimatch: 10.2.4
  path-to-regexp: 8.4.0
  qs: 6.14.2
  node-domexception: npm:@nolyfill/domexception@^1.0.28
  "@sinclair/typebox": 0.34.48
  tar: 7.5.13
  tough-cookie: 4.1.3
  yauzl: 3.2.1
  ip-address: 10.2.0

# pnpm 11: allowBuilds replaces onlyBuiltDependencies / ignoredBuiltDependencies.
allowBuilds:
  "@lydell/node-pty": true
  "@matrix-org/matrix-sdk-crypto-nodejs": true
  "@napi-rs/canvas": true
  "@tloncorp/api": true
  "@tloncorp/tlon-skill": true
  "@whiskeysockets/baileys": true
  "@whiskeysockets/libsignal-node": true
  authenticate-pam: true
  esbuild: true
  node-llama-cpp: true
  protobufjs: true
  sharp: true
  "@discordjs/opus": false
  koffi: false

packageExtensions:
  "@mariozechner/pi-coding-agent":
    dependencies:
      strip-ansi: "^7.2.0"
